server:
  port: ${HR_SERVER_PORT:8087}

spring:
  application:
    name: hr-platform

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    url: ${HR_DB_URL:jdbc:mysql://localhost:3306/hr_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${HR_DB_USERNAME:Eleven}
    password: ${HR_DB_PASSWORD:eleven}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

