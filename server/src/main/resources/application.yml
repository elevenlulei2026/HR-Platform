server:
  port: ${HR_SERVER_PORT:8087}

spring:
  application:
    name: hr-platform

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  datasource:
    url: ${HR_DB_URL:jdbc:mysql://localhost:3306/hr_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${HR_DB_USERNAME:Eleven}
    password: ${HR_DB_PASSWORD:eleven}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

hr:
  crypto:
    # 生产环境必须通过环境变量 HR_CRYPTO_KEY 注入 32 字节密钥（Base64）
    key: ${HR_CRYPTO_KEY:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
  storage:
    path: ${HR_STORAGE_PATH:./data/files}

logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

